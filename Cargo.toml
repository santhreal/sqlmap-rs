[package]
name = "sqlmap-rs"
version = "0.1.0"
edition = "2021"
description = "Type-safe asynchronous wrapper for the sqlmap REST API (sqlmapapi)"
authors = ["CORUM COLLECTIVE LLC (Santh Security)"]
license = "MIT"
publish = false

[dependencies]
async-trait = "0.1.80"
reqwest = { version = "0.12.3", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1.0.198", features = ["derive"] }
serde_json = "1.0.116"
thiserror = "1.0.58"
tokio = { version = "1.37.0", features = ["full"] }
tracing = "0.1.40"
